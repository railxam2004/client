openapi: 3.0.0
info:
  title: Housing Rental API
  version: 1.0.0
  description: API для работы с предложениями, отзывами и пользователями.
servers:
  - url: http://localhost:5000
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: Описание ошибки
      required:
        - message
    UserAuthResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        email:
          type: string
          format: email
          example: user@example.com
        username:
          type: string
          example: Alex
        avatar:
          type: string
          nullable: true
          example: http://localhost:5000/static/avatar.jpg
        isPro:
          type: boolean
          example: true
        token:
          type: string
          example: jwt-token-value
      required:
        - id
        - email
        - username
        - avatar
        - isPro
        - token
    Location:
      type: object
      properties:
        latitude:
          type: number
          format: float
          example: 48.8566
        longitude:
          type: number
          format: float
          example: 2.3522
        zoom:
          type: integer
          example: 13
      required:
        - latitude
        - longitude
        - zoom
    City:
      type: object
      properties:
        name:
          type: string
          enum:
            - Paris
            - Cologne
            - Brussels
            - Amsterdam
            - Hamburg
            - Dusseldorf
          example: Paris
        location:
          $ref: "#/components/schemas/Location"
      required:
        - name
        - location
    OfferPreview:
      type: object
      properties:
        id:
          type: string
          example: "1"
        title:
          type: string
          example: Beautiful apartment in city center
        type:
          type: string
          enum:
            - apartment
            - house
            - room
            - hotel
          example: apartment
        price:
          type: number
          example: 220
        city:
          $ref: "#/components/schemas/City"
        location:
          $ref: "#/components/schemas/Location"
        isFavorite:
          type: boolean
          example: false
        isPremium:
          type: boolean
          example: true
        rating:
          type: number
          example: 4.7
        previewImage:
          type: string
          example: http://localhost:5000/static/preview.jpg
      required:
        - id
        - title
        - type
        - price
        - city
        - location
        - isFavorite
        - isPremium
        - rating
        - previewImage
    Host:
      type: object
      properties:
        name:
          type: string
          example: Max
        isPro:
          type: boolean
          example: true
        avatarUrl:
          type: string
          example: http://localhost:5000/static/avatar.jpg
      required:
        - name
        - isPro
        - avatarUrl
    OfferFull:
      type: object
      properties:
        id:
          type: string
          example: "1"
        title:
          type: string
          example: Beautiful apartment in city center
        description:
          type: string
          example: Spacious apartment close to metro and city sights.
        type:
          type: string
          enum:
            - apartment
            - house
            - room
            - hotel
          example: apartment
        price:
          type: number
          example: 220
        city:
          $ref: "#/components/schemas/City"
        location:
          $ref: "#/components/schemas/Location"
        isFavorite:
          type: boolean
          example: false
        isPremium:
          type: boolean
          example: true
        rating:
          type: number
          example: 4.7
        bedrooms:
          type: integer
          example: 3
        goods:
          type: array
          items:
            type: string
          example:
            - Breakfast
            - Washer
            - Fridge
        host:
          $ref: "#/components/schemas/Host"
        images:
          type: array
          items:
            type: string
          example:
            - http://localhost:5000/static/photo-1.jpg
            - http://localhost:5000/static/photo-2.jpg
        maxAdults:
          type: integer
          example: 4
      required:
        - id
        - title
        - description
        - type
        - price
        - city
        - location
        - isFavorite
        - isPremium
        - rating
        - bedrooms
        - goods
        - host
        - images
        - maxAdults
    ReviewUser:
      type: object
      properties:
        name:
          type: string
          example: Alice
        avatarUrl:
          type: string
          example: http://localhost:5000/static/reviewer.jpg
        isPro:
          type: boolean
          example: false
      required:
        - name
        - avatarUrl
        - isPro
    Review:
      type: object
      properties:
        id:
          type: string
          example: "12"
        comment:
          type: string
          example: Отличное место, всё чисто и удобно.
        rating:
          type: number
          example: 5
        date:
          type: string
          format: date-time
          example: 2026-03-15T10:30:00.000Z
        user:
          $ref: "#/components/schemas/ReviewUser"
      required:
        - id
        - comment
        - rating
        - date
        - user
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password
    ReviewCreateRequest:
      type: object
      properties:
        comment:
          type: string
          minLength: 5
          maxLength: 1024
        rating:
          type: integer
          minimum: 1
          maximum: 5
      required:
        - comment
        - rating
tags:
  - name: Users
  - name: Offers
  - name: Reviews
paths:
  /register:
    post:
      summary: Регистрация пользователя
      tags:
        - Users
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - email
                - password
                - userType
                - username
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                userType:
                  type: string
                  enum:
                    - normal
                    - pro
                username:
                  type: string
                avatar:
                  type: string
                  format: binary
                  description: Аватар пользователя
            examples:
              generated:
                summary: Сгенерированный пример (только текстовые поля)
                value:
                  email: aidan42@gmail.com
                  password: vtAFT0c6sl
                  userType: pro
                  username: Travis_Kuphal80
      responses:
        "201":
          description: Пользователь успешно зарегистрирован
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserAuthResponse"
        "400":
          description: Ошибка валидации или пользователь уже существует
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /login:
    post:
      summary: Авторизация пользователя
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            example:
              email: marcella_stanton@hotmail.com
              password: G3qSA0QkcP
      responses:
        "200":
          description: Успешный логин, возвращает данные пользователя и токен
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserAuthResponse"
        "400":
          description: Пользователь не найден или пароль неверный
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      summary: Проверка статуса авторизации
      tags:
        - Users
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Пользователь авторизован
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserAuthResponse"
        "401":
          description: Токен отсутствует или недействителен
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /logout:
    delete:
      summary: Выход пользователя
      tags:
        - Users
      responses:
        "204":
          description: Успешный выход без тела ответа
  /offers:
    get:
      summary: Получить список предложений
      tags:
        - Offers
      responses:
        "200":
          description: Список предложений
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OfferPreview"
    post:
      summary: Создание нового предложения
      description: >
        Создает новое предложение. Принимает данные в формате
        multipart/form-data. Поле previewImage обязательно. Поле photos — массив
        до 6 файлов. Автор предложения берется из токена авторизованного
        пользователя.
      tags:
        - Offers
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - title
                - description
                - city
                - price
                - rooms
                - guests
                - type
                - features
                - latitude
                - longitude
                - previewImage
              properties:
                title:
                  type: string
                description:
                  type: string
                publishDate:
                  type: string
                  format: date
                city:
                  type: string
                  enum:
                    - Paris
                    - Cologne
                    - Brussels
                    - Amsterdam
                    - Hamburg
                    - Dusseldorf
                isPremium:
                  type: boolean
                isFavorite:
                  type: boolean
                rating:
                  type: number
                type:
                  type: string
                  enum:
                    - apartment
                    - house
                    - room
                    - hotel
                rooms:
                  type: integer
                guests:
                  type: integer
                price:
                  type: number
                features:
                  type: string
                  description: JSON-строка массива из значений Breakfast, Air conditioning, Laptop
                    friendly workspace, Baby seat, Washer, Towels, Fridge
                commentsCount:
                  type: integer
                latitude:
                  type: number
                longitude:
                  type: number
                previewImage:
                  type: string
                  format: binary
                  description: Основное изображение
                photos:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Дополнительные изображения
            examples:
              generated:
                summary: Сгенерированный пример (только текстовые поля)
                value:
                  title: verumtamen desidero arma
                  description: Communis audeo cernuus desolo utpote callide accedo ipsam. Aequus
                    defaeco cado theca.
                  publishDate: 2026-03-14
                  city: Paris
                  isPremium: false
                  isFavorite: false
                  rating: 4.7
                  type: apartment
                  rooms: 3
                  guests: 1
                  price: 418
                  features: '["Breakfast","Baby seat"]'
                  commentsCount: 21
                  latitude: 67.6811
                  longitude: -127.8823
      responses:
        "201":
          description: Предложение успешно создано
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfferPreview"
        "400":
          description: Ошибка валидации данных
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /offers/{id}:
    get:
      summary: Получить детальную информацию по предложению
      tags:
        - Offers
      parameters:
        - name: id
          in: path
          required: true
          description: ID предложения
          schema:
            type: string
            example: "1"
      responses:
        "200":
          description: Детальная информация о предложении
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfferFull"
        "404":
          description: Предложение не найдено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /favorite:
    get:
      summary: Получить список избранных предложений
      description: Возвращает предложения, у которых флаг isFavorite равен true.
      tags:
        - Offers
      responses:
        "200":
          description: Список избранных предложений
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OfferPreview"
  /favorite/{offerId}/{status}:
    post:
      summary: Изменить статус избранного предложения
      tags:
        - Offers
      security:
        - bearerAuth: []
      parameters:
        - name: offerId
          in: path
          required: true
          description: ID предложения
          schema:
            type: string
            example: "1"
        - name: status
          in: path
          required: true
          description: Новый статус избранного (1 — добавить, 0 — убрать)
          schema:
            type: string
            enum:
              - "0"
              - "1"
            example: "1"
      responses:
        "200":
          description: Статус избранного обновлен
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfferPreview"
        "401":
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Предложение не найдено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /comments/{offerId}:
    get:
      summary: Получить комментарии по предложению
      tags:
        - Reviews
      parameters:
        - name: offerId
          in: path
          required: true
          description: ID предложения
          schema:
            type: string
            example: "1"
      responses:
        "200":
          description: Список комментариев к предложению
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"
        "500":
          description: Ошибка при получении комментариев
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Добавить комментарий к предложению
      tags:
        - Reviews
      security:
        - bearerAuth: []
      parameters:
        - name: offerId
          in: path
          required: true
          description: ID предложения
          schema:
            type: string
            example: "1"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewCreateRequest"
            example:
              comment: Bibo culpa culpa calcar volva harum vehemens denuo corona coniuratio
                ago thorax.
              rating: 2
      responses:
        "201":
          description: Комментарий успешно создан
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
        "400":
          description: Ошибка валидации данных
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Оффер не найден
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
